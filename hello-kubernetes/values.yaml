# Default values for Nigam Family Microservices App
# 4 services: api-gateway, family-service, messages-service, events-service

replicaCount: 1

namespace: hello-kubernetes-ns

images:
  gateway:
    repository: dilipnigam007/family-gateway
    tag: "28"
    pullPolicy: Always
  family:
    repository: dilipnigam007/family-svc
    tag: "28"
    pullPolicy: Always
  messages:
    repository: dilipnigam007/messages-svc
    tag: "28"
    pullPolicy: Always
  events:
    repository: dilipnigam007/events-svc
    tag: "28"
    pullPolicy: Always

# Only the gateway is exposed externally via NodePort
gateway:
  port: 3000
  nodePort: 32000

# Backend services — ClusterIP (internal only, gateway calls them)
familyService:
  port: 3001

messagesService:
  port: 3002

eventsService:
  port: 3003
